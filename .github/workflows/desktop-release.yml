name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: |
          npm test
          npm run check:icons
          npm run check:public-release
          npm run check:public-release:strict
          npm audit --audit-level=low

  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    needs: release-checks
    env:
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require signing for public tag releases
        if: startsWith(github.ref, 'refs/tags/') && env.MACOS_SIGNING_ENABLED != 'true'
        run: |
          echo "Apple signing secrets are required for public tag releases."
          echo "Set MACOS_CERTIFICATE_BASE64, MACOS_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID."
          exit 1

      - name: Import Apple Developer ID certificate
        if: env.MACOS_SIGNING_ENABLED == 'true'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed and notarized macOS DMG
        if: env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run electron:build -- --mac dmg --publish never

      - name: Verify signed macOS app
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          APP_PATH="$(find release -type d -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in release output."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Build unsigned macOS DMG for manual testing
        if: env.MACOS_SIGNING_ENABLED != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          SKIP_NOTARIZE: 'true'
        run: npm run electron:build -- --mac dmg --publish never

      - name: Upload signed notarized macOS DMG
        if: env.MACOS_SIGNING_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-signed-notarized
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      - name: Upload unsigned macOS test DMG
        if: env.MACOS_SIGNING_ENABLED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-unsigned-test
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: release-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          SKIP_NOTARIZE: 'true'
        run: npm run electron:build -- --win nsis --publish never

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos-dmg
      - windows-exe
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mapfile -t ASSETS < <(find release-assets -type f | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "AI Video Production Editor ${TAG}" \
              --notes "Download the newest desktop installers here: signed and notarized macOS DMG plus Windows EXE. End users do not need to build or notarize the app themselves."
          fi
