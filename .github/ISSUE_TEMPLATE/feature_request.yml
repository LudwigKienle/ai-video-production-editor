name: Feature request
description: Suggest a workflow, model adapter, or UI improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the editor do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Model/provider adapter
        - Video generation
        - Image generation
        - Audio
        - Editing/timeline
        - Export
        - Project/library
        - UI/UX
        - Docs
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Provider docs, screenshots, mockups, or examples.
