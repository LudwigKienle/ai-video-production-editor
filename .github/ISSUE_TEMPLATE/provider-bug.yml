name: Provider or model bug
description: Report a problem with an AI provider, model, API key setup, quota, or generation behavior.
title: "[Provider]: "
labels: ["provider", "bug"]
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "OpenAI, Gemini, Replicate, FAL, xAI, ElevenLabs, ..."
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model or feature
      placeholder: "Video generation, image generation, audio, storyboard, ..."
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      placeholder: Describe the error, unexpected output, or missing behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Opened workspace ...
        2. Selected provider/model ...
        3. Submitted prompt ...
        4. Saw error/output ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error text
      description: Paste only non-secret error output. Remove API keys, tokens, local private paths, and personal data.
    validations:
      required: false
