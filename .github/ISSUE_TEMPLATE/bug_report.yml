name: Bug report
description: Report something broken or confusing
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Windows 11, Node 20, Electron dev, browser dev
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove API keys, tokens, media paths, and private project data.
      render: text
